name: Sync Music Data

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install NeteaseCloudMusicApi

      - name: Generate music data
        run: node scripts/generate-music.mjs

      - name: Commit & Push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/music.json
          git diff --staged --quiet || git commit -m "chore: update music data"
          git push
